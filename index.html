    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #dbdbdb;
      --text: #262626;
      --muted: #737373;
      --hint: #a8a8a8;
      --accent: #3897f0;
      --green: #22c55e;
      --radius: 4px;
      --font: 'DM Sans', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #121212;
        --border: #262626;
        --text: #f5f5f5;
        --muted: #a8a8a8;
        --hint: #737373;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- TOP NAV ---- */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 54px;
      max-width: 600px;
      margin: 0 auto;
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .nav-icons { display: flex; gap: 18px; align-items: center; }
    .nav-icons svg {
      width: 22px; height: 22px;
      stroke: var(--text); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      cursor: pointer;
    }

    /* ---- WRAPPER ---- */
    .wrap { max-width: 600px; margin: 0 auto; }

    /* ---- PROFILE ---- */
    .profile { padding: 20px 20px 0; }
    .profile-top { display: flex; align-items: center; gap: 28px; margin-bottom: 16px; }

    .avatar-ring {
      width: 86px; height: 86px; flex-shrink: 0; border-radius: 50%;
      background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
      padding: 2.5px;
    }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: #e9e9e9;
      border: 3px solid var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 500; color: var(--muted);
      overflow: hidden;
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

    .stats { display: flex; gap: 0; flex: 1; justify-content: space-around; }
    .stat { text-align: center; cursor: default; }
    .stat-num { font-size: 17px; font-weight: 500; color: var(--text); line-height: 1.2; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* available dot */
    .available-dot {
      display: inline-block; width: 8px; height: 8px;
      background: var(--green); border-radius: 50%;
      margin-right: 4px; vertical-align: middle;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .bio { margin-bottom: 14px; }
    .bio-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .bio-role { font-size: 13px; color: var(--muted); margin-bottom: 3px; }
    .bio-desc { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 4px; }
    .bio-link { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .bio-link:hover { text-decoration: underline; }

    .actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .btn {
      flex: 1; padding: 7px 0; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px; font-weight: 500; color: var(--text);
      cursor: pointer; text-align: center; font-family: var(--font);
    }
    .btn:hover { background: var(--bg); }
    .btn-primary { background: #0095f6; color: #fff; border-color: #0095f6; }
    .btn-primary:hover { background: #1aa1f5; }

    /* ---- HIGHLIGHTS ---- */
    .highlights {
      display: flex; gap: 16px; padding: 12px 20px;
      overflow-x: auto; scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .highlights::-webkit-scrollbar { display: none; }
    .highlight { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; }
    .hl-ring {
      width: 62px; height: 62px; border-radius: 50%;
      border: 1px solid var(--border); padding: 3px;
      transition: border-color 0.15s;
    }
    .highlight.active .hl-ring {
      border-color: transparent;
      background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
    }
    .hl-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .hl-label { font-size: 11px; color: var(--text); text-align: center; }

    /* ---- TABS ---- */
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 12px 0; cursor: pointer;
      border-bottom: 2px solid transparent; color: var(--hint);
      transition: all 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }
    .tab svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

    /* ---- GRID ---- */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .post {
      aspect-ratio: 1; cursor: pointer; overflow: hidden;
      position: relative; background: #e9e9e9;
    }
    .post.hidden { display: none; }
    .post-bg {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; padding: 8px;
    }
    .post-emoji { font-size: 28px; line-height: 1; }
    .post-name {
      font-size: 9px; font-weight: 500; color: rgba(0,0,0,0.55);
      text-align: center; line-height: 1.3; padding: 0 4px;
    }
    .post-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: center; justify-content: center;
      gap: 18px; opacity: 0; transition: opacity 0.18s;
    }
    .post:hover .post-overlay { opacity: 1; }
    .ov-stat { display: flex; align-items: center; gap: 5px; color: #fff; font-size: 13px; font-weight: 500; }
    .ov-stat svg { width: 16px; height: 16px; fill: white; }

    /* ---- SAVED TAB ---- */
    .saved-panel {
      display: none;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .saved-panel.active { display: block; }
    .saved-panel-icon { font-size: 48px; margin-bottom: 12px; }

    /* ---- MODAL ---- */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 4px;
      width: 100%; max-width: 700px;
      display: flex; max-height: 92vh;
      overflow: hidden;
    }
    .modal-media {
      width: 340px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: #efefef;
    }
    .modal-media-inner {
      width: 100%; height: 100%; min-height: 340px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }
    .modal-media-inner img { width: 100%; height: 100%; object-fit: cover; }
    .modal-emoji { font-size: 64px; line-height: 1; }
    .modal-cat { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .modal-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .modal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #e9e9e9;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; color: var(--muted); flex-shrink: 0;
    }
    .modal-username { font-size: 13px; font-weight: 500; }
    .modal-close {
      margin-left: auto; font-size: 22px; cursor: pointer;
      color: var(--muted); line-height: 1; padding: 4px 0;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 16px; flex: 1; overflow-y: auto; }
    .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
    .modal-desc { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 14px; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .modal-tag { font-size: 13px; color: var(--accent); cursor: pointer; }
    .modal-link {
      display: inline-block; font-size: 13px; font-weight: 500;
      color: var(--accent); text-decoration: none; cursor: pointer;
    }
    .modal-link:hover { text-decoration: underline; }
    .modal-footer {
      border-top: 1px solid var(--border);
      padding: 10px 16px; display: flex; gap: 14px; flex-shrink: 0;
    }
    .modal-action {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; color: var(--muted); cursor: pointer;
    }
    .modal-action:hover { color: var(--text); }
    .modal-action svg {
      width: 20px; height: 20px; stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ---- RESPONSIVE ---- */

    /* ---- DESKTOP: Instagram-style header layout ---- */
    @media (min-width: 768px) {

      /* Expand nav and content to 935px (Instagram's desktop width) */
      .nav  { max-width: 935px; padding: 0 20px; }
      .wrap { max-width: 935px; }

      /* Profile header: avatar LEFT, info RIGHT — 2-column grid.
         display:contents on .profile-top dissolves that wrapper so
         avatar-ring and stats both become direct grid children. */
      .profile {
        display: grid;
        grid-template-columns: 168px 1fr;
        grid-template-rows: auto auto auto;
        column-gap: 80px;
        padding: 44px 20px 32px;
        border-bottom: 1px solid var(--border);
      }

      /* Dissolve the mobile flex-row wrapper — children join the grid */
      .profile-top { display: contents; }

      /* Avatar: tall, spans all 3 info rows */
      .avatar-ring {
        grid-column: 1;
        grid-row: 1 / 4;
        align-self: center;
        width: 150px;
        height: 150px;
      }
      .avatar-inner { font-size: 34px; }

      /* Stats row: top-right of profile */
      .stats {
        grid-column: 2;
        grid-row: 1;
        justify-content: flex-start;
        gap: 40px;
        align-self: center;
        margin-bottom: 0;
      }
      .stat { text-align: left; }
      .stat-num { font-size: 17px; }
      .stat-label { font-size: 13px; }

      /* Bio: middle-right */
      .bio {
        grid-column: 2;
        grid-row: 2;
        margin-bottom: 0;
        padding: 16px 0 0;
      }
      .bio-name { font-size: 15px; margin-bottom: 4px; }
      .bio-role { font-size: 13px; margin-bottom: 4px; }
      .bio-desc { font-size: 13px; }

      /* Buttons: bottom-right, capped width */
      .actions {
        grid-column: 2;
        grid-row: 3;
        max-width: 260px;
        margin-bottom: 0;
        padding-top: 16px;
      }

      /* Highlights: full width, more padding */
      .highlights { padding: 14px 20px; gap: 20px; }
      .hl-ring { width: 68px; height: 68px; }
      .hl-inner { font-size: 24px; }
      .hl-label { font-size: 12px; }

      /* Grid: keep 3 cols, slightly larger gap */
      .grid { gap: 4px; }

      /* Modal: wider on desktop */
      .modal { max-width: 860px; }
      .modal-media { width: 420px; }
      .modal-media-inner { min-height: 420px; }
    }

    /* ---- MOBILE: 2-column grid + tap overlay ---- */
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
      .post-emoji { font-size: 24px; }
      .post-name  { font-size: 10px; }
      .post:active .post-overlay { opacity: 1; }
    }

    /* ---- MOBILE MODAL: stack vertically ---- */
    @media (max-width: 520px) {
      .modal { flex-direction: column; }
      .modal-media { width: 100%; min-height: 220px; }
      .modal-media-inner { min-height: 220px; }
    }
  </style>
</head>

document.getElementById('nav-username').textContent = PROFILE.username;
document.getElementById('bio-name').textContent = PROFILE.name;
document.getElementById('bio-role').textContent = PROFILE.role;
document.getElementById('bio-desc').textContent = PROFILE.bio;
document.getElementById('bio-link').textContent = '🔗 ' + PROFILE.websiteLabel;
document.getElementById('bio-link').href = PROFILE.website;
// Auto-count projects
document.getElementById('stat1-val').textContent = PROJECTS.length;
document.getElementById('stat1-lbl').textContent = 'projects';
document.getElementById('stat2-val').textContent = PROFILE.stat2.val;
document.getElementById('stat2-lbl').textContent = PROFILE.stat2.label;
document.getElementById('stat3-val').textContent = PROFILE.stat3.val;
document.getElementById('stat3-lbl').textContent = PROFILE.stat3.label;

// Avatar
const avatarEl = document.getElementById('avatar');
if (PROFILE.photo) {
  avatarEl.innerHTML = `<img src="${PROFILE.photo}" alt="${PROFILE.name}" loading="lazy" />`;
} else {
  avatarEl.textContent = PROFILE.initials;
}

// Hire me button
document.getElementById('hire-btn').onclick = () => window.location.href = 'mailto:' + PROFILE.email;

// Share button with clipboard fallback
document.getElementById('share-btn').onclick = () => {
  const url = window.location.href;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('share-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Share profile'; }, 2000);
    });
  } else {
    // Fallback for HTTP or unsupported browsers
    const el = document.createElement('textarea');
    el.value = url;
    el.style.position = 'fixed';
    el.style.opacity = '0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const btn = document.getElementById('share-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Share profile'; }, 2000);
  }
};

// Highlights with filtering
let activeFilter = 'All';
const hlWrap = document.getElementById('highlights');

HIGHLIGHTS.forEach(h => {
  const div = document.createElement('div');
  div.className = 'highlight' + (h.label === 'All' ? ' active' : '');
  div.dataset.cat = h.label;
  div.innerHTML = `
    <div class="hl-ring"><div class="hl-inner">${h.emoji}</div></div>
    <div class="hl-label">${h.label}</div>`;
  div.onclick = () => {
    activeFilter = h.label;
    document.querySelectorAll('.highlight').forEach(el => el.classList.remove('active'));
    div.classList.add('active');
    filterGrid();
  };
  hlWrap.appendChild(div);
});

// Grid
const grid = document.getElementById('grid');
const postEls = [];

PROJECTS.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'post';
  el.dataset.cat = p.cat;
  el.innerHTML = `
    <div class="post-bg" style="background:${p.color}30;">
      <div class="post-emoji">${p.emoji}</div>
      <div class="post-name">${p.title}</div>
    </div>
    <div class="post-overlay">
      <div class="ov-stat">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${p.likes}
      </div>
    </div>`;
  el.onclick = () => openModal(p);
  grid.appendChild(el);
  postEls.push(el);
});

function filterGrid() {
  postEls.forEach(el => {
    const match = activeFilter === 'All' || el.dataset.cat === activeFilter;
    el.classList.toggle('hidden', !match);
  });
}

// Tab switching
function switchTab(tab) {
  const gridEl = document.getElementById('grid');
  const savedEl = document.getElementById('saved-panel');
  const tabGrid = document.getElementById('tab-grid');
  const tabSaved = document.getElementById('tab-saved');

  if (tab === 'grid') {
    gridEl.style.display = 'grid';
    savedEl.classList.remove('active');
    tabGrid.classList.add('active');
    tabSaved.classList.remove('active');
  } else {
    gridEl.style.display = 'none';
    savedEl.classList.add('active');
    tabGrid.classList.remove('active');
    tabSaved.classList.add('active');
  }
}

// Modal
function openModal(p) {
  document.getElementById('modal-media').innerHTML = `
    <div style="width:100%;height:100%;min-height:340px;background:${p.color}25;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;">
      <div class="modal-emoji">${p.emoji}</div>
      <div class="modal-cat">${p.cat}</div>
    </div>`;
  document.getElementById('modal-uname').textContent = PROFILE.username;
  document.getElementById('modal-avatar').textContent = PROFILE.initials;
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-desc').textContent = p.desc;
  document.getElementById('modal-likes').textContent = p.likes + ' likes';
  document.getElementById('modal-tags').innerHTML = p.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
  const link = document.getElementById('modal-link');
  if (p.link && p.link !== '#') {
    link.href = p.link;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal').onclick = (e) => { if (e.target.id === 'modal') closeModal(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
function closeModal() { document.getElementById('modal').classList.remove('open'); }
</script>
</body>
</html>
